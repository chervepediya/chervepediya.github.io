---
layout: default
---

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="{{ site.baseurl }}/css/style.css">
</head>
<body>
    <div class="main-container">
        <div class="sidebar" data-aos="fade-right">
            {% include sidebar.html %}
        </div>
        <div class="posts-container">
            <div class="post" data-aos="fade-up">
                <h2>{{ page.title }}</h2>
                {% if page.image %}
                <div class="post-image">
                    <div class="post-image-bg" style="background-image: url('{{ page.image }}');"></div>
                    <img src="{{ page.image }}" alt="{{ page.title }}">
                </div>
                {% endif %}
                <p>{{ content }}</p>
                <div class="post-footer">
                    <span class="post-date">{{ page.date | date: "%d.%m.%Y" }}</span>
                </div>
            </div>
        </div>
    </div>

    <button id="scroll-top" class="scroll-btn"><i class="fas fa-chevron-up"></i></button>
    <button id="scroll-bottom" class="scroll-btn"><i class="fas fa-chevron-down"></i></button>

    <footer id="footer">
        <p>Связаться со мной:</p>
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fas fa-envelope"></i></a>
    </footer>

    <div class="image-modal" id="imageModal">
        <img src="" alt="Увеличенное изображение" id="modalImage">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="{{ site.baseurl }}/js/scripts.js"></script>
</body>
  </html>
