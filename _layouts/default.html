<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ru' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <!-- Подключение внешних библиотек -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Локальные стили -->
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | absolute_url }}">
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <!-- Telegram Embed Script -->
    <script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-post="channel/post" data-width="100%"></script>
</head>
<body>
    <div class="main-container">
        {% include sidebar.html %}
        <div class="posts-container">
            {{ content }}
        </div>
    </div>

    <!-- Мобильная шапка -->
    <header class="mobile-header">
        <div class="header-content">
            <div class="header-left">
                <img src="{{ '/assets/images/logo.jpg' | absolute_url }}" alt="Логотип" class="logo">
                <h1 class="site-title">
                    {{ site.title }}
                    <span class="marker-blue"></span>
                    <span class="marker-yellow"></span>
                </h1>
            </div>
            <button class="menu-toggle"><i class="fas fa-bars"></i></button>
        </div>
        <nav class="mobile-menu">
            {% for item in site.menu %}
                {% if item.url contains '#' %}
                    <a href="{{ item.url }}" class="nav-link">
                        <span class="icon"><i class="{{ item.icon }}"></i></span> {{ item.title }}
                    </a>
                {% else %}
                    <a href="{{ item.url | absolute_url }}" class="nav-link">
                        <span class="icon"><i class="{{ item.icon }}"></i></span> {{ item.title }}
                    </a>
                {% endif %}
            {% endfor %}
        </nav>
    </header>

    <!-- Кнопки прокрутки -->
    <button id="scroll-top" class="scroll-btn"><i class="fas fa-chevron-up"></i></button>
    <button id="scroll-bottom" class="scroll-btn"><i class="fas fa-chevron-down"></i></button>

    {% include footer.html %}

    <!-- Модальное окно -->
    <div class="image-modal" id="imageModal">
        <img src="" alt="Увеличенное изображение" id="modalImage">
    </div>

    <!-- Скрипты -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="{{ '/assets/js/scripts.js' | absolute_url }}"></script>
</body>
</html>
