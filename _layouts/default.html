<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ru' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }} - Черветред, Червепедия</title>
    <meta name="description" content="Черветред и Червепедия - ваш источник информации о червепедии и черветреде.">
    <meta name="keywords" content="черветред, червепедия, информация, сайт">
    <meta property="og:title" content="{{ page.title | default: site.title }} - Черветред, Червепедия">
    <meta property="og:description" content="Черветред и Червепедия - ваш источник информации о червепедии и черветреде.">
    <meta property="og:image" content="{{ '/assets/images/logo.jpg' | absolute_url }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:type" content="website">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | absolute_url }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-post="channel/post" data-width="100%"></script>
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script> <!-- Добавляем imagesLoaded -->
</head>
<body>
    <div class="main-container">
        {% include sidebar.html %}
        <div class="posts-container">
            {{ content }}
        </div>
    </div>

    <header class="mobile-header">
        <div class="header-content">
            <div class="header-left">
                <img src="{{ '/assets/images/logo.jpg' | absolute_url }}" alt="Логотип Черветред Червепедия" class="logo">
                <h1 class="site-title">
                    {{ site.title }}
                    <span class="marker-blue"></span>
                    <span class="marker-yellow"></span>
                </h1>
            </div>
            <button class="menu-toggle"><i class="fas fa-bars"></i></button>
        </div>
        <nav class="mobile-menu">
            {% for item in site.menu %}
                {% if item.url contains '#' %}
                    <a href="{{ item.url }}" class="nav-link">
                        <span class="icon"><i class="{{ item.icon }}"></i></span> {{ item.title }}
                    </a>
                {% else %}
                    <a href="{{ item.url | absolute_url }}" class="nav-link">
                        <span class="icon"><i class="{{ item.icon }}"></i></span> {{ item.title }}
                    </a>
                {% endif %}
            {% endfor %}
        </nav>
    </header>

    <button id="scroll-top" class="scroll-btn"><i class="fas fa-chevron-up"></i></button>
    <button id="scroll-bottom" class="scroll-btn"><i class="fas fa-chevron-down"></i></button>

    {% include footer.html %}

    <div class="image-modal" id="imageModal">
        <img src="" alt="Увеличенное изображение" id="modalImage">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="{{ '/assets/js/scripts.js' | absolute_url }}"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var grids = document.querySelectorAll('.image-grid');
        grids.forEach(function(grid) {
            imagesLoaded(grid, function() { // Ждём загрузки всех картинок
                var msnry = new Masonry(grid, {
                    itemSelector: '.image-item',
                    columnWidth: 150, // Базовая ширина колонок (можно настроить)
                    gutter: 10, // Отступ между элементами
                    fitWidth: true, // Подгоняем под ширину контейнера
                    horizontalOrder: true // Сохраняем горизонтальный порядок
                });
            });
        });
    });
    </script>
</body>
</html>
