<body>
    <div class="main-container">
        {% include sidebar.html %}
        <div class="posts-container">
            {{ content }}
        </div>
    </div>

    <header class="mobile-header">
        <div class="header-content">
            <div class="header-left">
                <img src="{{ '/assets/images/logo.jpg' | absolute_url }}" alt="Логотип  Червепедия" class="logo">
                <h1 class="site-title">
                    {{ site.title }}

                </h1>
            </div>
            <button class="menu-toggle"><i class="fas fa-bars"></i></button>
        </div>
        <nav class="mobile-menu">
            {% for item in site.menu %}
                {% if item.url contains '#' %}
                    <a href="{{ item.url }}" class="nav-link">
                        <span class="icon"><i class="{{ item.icon }}"></i></span> {{ item.title }}
                    </a>
                {% else %}
                    <a href="{{ item.url | absolute_url }}" class="nav-link">
                        <span class="icon"><i class="{{ item.icon }}"></i></span> {{ item.title }}
                    </a>
                {% endif %}
            {% endfor %}
        </nav>
    </header>

    <button id="scroll-bottom" class="scroll-btn"><i class="fas fa-chevron-down"></i></button>
