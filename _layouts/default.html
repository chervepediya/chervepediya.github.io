<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <!-- Подключение стилей -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <!-- Локальные стили -->
    <link rel="stylesheet" href="{{ site.baseurl }}/css/style.css">
</head>
<body>
    <!-- Основной контент страницы -->
    {{ content }}

    <!-- Кнопки прокрутки -->
    <button id="scroll-top" class="scroll-btn"><i class="fas fa-chevron-up"></i></button>
    <button id="scroll-bottom" class="scroll-btn"><i class="fas fa-chevron-down"></i></button>

    <!-- Футер -->
    <footer id="footer">
        <p>Связаться со мной:</p>
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fas fa-envelope"></i></a>
    </footer>

    <!-- Модальное окно для изображений -->
    <div class="image-modal" id="imageModal">
        <img src="" alt="Увеличенное изображение" id="modalImage">
    </div>

    <!-- Подключение скриптов -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="{{ site.baseurl }}/js/scripts.js"></script>
</body>
                                                            </html>
